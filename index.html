    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"

  <body>
    <main class="shell">
      <section class="stage" id="hero">
        <div class="noise noise-one" aria-hidden="true"></div>
        <div class="noise noise-two" aria-hidden="true"></div>
        <div class="noise noise-three" aria-hidden="true"></div>

        <a class="brand" href="#hero" aria-label="rickqian.com">
          <span class="brand-mark">RQ</span>
          <span class="brand-copy">
            <strong>rickqian.com</strong>
            <span>Product matrix</span>
          </span>
        </a>

        <div class="hero-copy">
          <p class="eyebrow">Enter</p>
          <h1>Choose the right direction.</h1>
        </div>

        <div class="entry-grid" aria-label="Product choices">
          <article class="entry-card entry-card-dark">
            <p class="entry-kicker">World to you</p>
            <h2>InfoRadar</h2>
            <p class="entry-note">External signal, compressed.</p>
            <a
              class="button button-dark"
              href="https://inforadar.rickqian.com/"
              data-carry-context
              data-default-product="inforadar"
              data-default-src="rickqian.com"
              data-default-entry="root-choice"
            >Open InfoRadar</a>
          </article>

          <article class="entry-card entry-card-light">
            <p class="entry-kicker">You to yourself</p>
            <h2>Mirror</h2>
            <p class="entry-note">Internal clarity, surfaced.</p>
            <a
              class="button button-light"
              href="https://mirror.rickqian.com/"
              data-carry-context
              data-default-product="mirror"
              data-default-src="rickqian.com"
              data-default-entry="root-choice"
            >Open Mirror</a>
          </article>
        </div>
      </section>
    </main>

    <script>
      const allowedKeys = ["product", "src", "channel", "campaign", "creative", "entry"];
      const pageParams = new URLSearchParams(window.location.search);

      const shouldCarry = (href) => {
        if (!href || href.startsWith("#") || href.startsWith("mailto:") || href.startsWith("tel:")) {
          return false;
        }

        try {
          const url = new URL(href, window.location.href);
          return url.protocol === "http:" || url.protocol === "https:";
        } catch {
          return false;
        }
      };

      const applyContext = (link) => {
        if (!shouldCarry(link.getAttribute("href"))) {
          return;
        }

        const targetUrl = new URL(link.href, window.location.href);

        allowedKeys.forEach((key) => {
          const existing = targetUrl.searchParams.get(key);
          const incoming = pageParams.get(key);
          const fallback = link.dataset[`default${key.charAt(0).toUpperCase()}${key.slice(1)}`];
          const value = existing || incoming || fallback;

          if (value) {
            targetUrl.searchParams.set(key, value);
          }
        });

        link.href = targetUrl.toString();
      };

      document.querySelectorAll("[data-carry-context]").forEach(applyContext);
    </script>
  </body>
</html>
